<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex justify-center items-center p-4 relative">

    <!-- Main Payment Card -->
    <div class="bg-white w-full max-w-md rounded-3xl shadow-lg overflow-hidden border border-gray-200">
        
        <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-200">
            <div class="flex items-center space-x-2 bg-gray-50 border border-emerald-400 rounded-full px-3 py-1.5 w-full mr-3">
                <i class="fa-solid fa-circle-check text-emerald-500"></i>
                <span class="text-xs text-gray-700 truncate font-medium">Payment</span>
            </div>
            <button onclick="window.location.reload()" class="text-gray-500 hover:text-gray-700">
                <i class="fa-solid fa-rotate-right text-sm"></i>
            </button>
        </div>

        <div class="bg-sky-500 text-white text-center py-4 font-bold text-xl tracking-wide shadow-inner">
            Payment
        </div>

        <div class="p-6 space-y-5">
            
            <div class="flex justify-between items-center">
                <span class="text-gray-900 font-bold text-base">Order will be closed in:</span>
                <span id="timer" class="bg-sky-50 text-sky-600 font-bold px-3 py-1.5 rounded-xl text-sm border border-sky-100">02:30</span>
            </div>

            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-200 space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500 font-medium">Customer Name:</span>
                    <span class="text-gray-900 font-bold text-right uppercase">NAGAMUTHU KUPPAN</span>
                </div>
                <div class="flex justify-between text-sm border-t border-gray-200 pt-2">
                    <span class="text-gray-500 font-medium">Loan Name:</span>
                    <span class="text-gray-900 font-bold uppercase">TAP MONEY</span>
                </div>
            </div>

            <div class="space-y-1">
                <span class="text-gray-600 text-sm font-semibold block">Amount</span>
                <span class="text-gray-900 font-extrabold text-2xl">₹ 5400</span>
            </div>

            <div class="space-y-1">
                <span class="text-gray-600 text-sm font-semibold block">VPA / UPI</span>
                <div class="flex space-x-2">
                    <input type="text" id="vpa-id" readonly value="sakil.hossen@ptyes" 
                           class="bg-white border border-gray-300 rounded-xl px-4 py-2.5 text-sm font-medium text-gray-800 w-full focus:outline-none">
                    <button onclick="copyVPA()" class="border-2 border-blue-500 text-blue-500 hover:bg-blue-50 font-bold px-4 py-2.5 rounded-xl text-sm tracking-wider uppercase transition-colors">
                        Copy
                    </button>
                </div>
            </div>

            <a href="#" class="text-blue-600 font-bold text-sm flex items-center space-x-1 hover:underline">
                <i class="fa-solid fa-paper-plane text-xs"></i>
                <span>How to transfer money</span>
            </a>

            <div class="grid grid-cols-2 gap-3">
                <div class="border border-gray-200 rounded-xl p-3 flex items-center justify-center h-14 bg-gray-50/50 cursor-pointer hover:border-blue-300 transition-all">
                    <span class="text-sky-600 font-extrabold text-lg">pay<span class="text-cyan-400">tm</span></span>
                </div>
                <div class="border border-gray-200 rounded-xl p-3 flex items-center justify-center h-14 bg-gray-50/50 cursor-pointer hover:border-blue-300 transition-all">
                    <span class="text-indigo-700 font-extrabold text-lg">Phone<span class="text-purple-500">Pe</span></span>
                </div>
                <div class="border border-gray-200 rounded-xl p-3 flex items-center justify-center h-14 bg-gray-50/50 cursor-pointer hover:border-blue-300 transition-all">
                    <span class="text-gray-700 font-bold text-lg"><span class="text-blue-500">G</span> Pay</span>
                </div>
                <div class="border border-gray-200 rounded-xl p-3 flex items-center justify-center h-14 bg-gray-50/50 cursor-pointer hover:border-blue-300 transition-all">
                    <span class="text-emerald-600 font-black italic tracking-wider text-base">UPI</span>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <div class="text-blue-900 font-bold text-sm flex items-center space-x-1">
                    <i class="fa-solid fa-arrow-down text-xs"></i>
                    <span>Fill the UTR number after payment</span>
                </div>
                <input type="text" placeholder="Input UTR number" 
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <button id="submitBtn" onclick="submitUTR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-full text-base transition-colors shadow-md shadow-blue-200">
                Submit UTR
            </button>

        </div>
    </div>

    <!-- Custom Popup Modal -->
    <div id="customModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex justify-center items-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 flex flex-col items-center text-center shadow-2xl animate-fade-in">
            
            <!-- Green Check Circle -->
            <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg shadow-emerald-100 mb-5">
                <i class="fa-solid fa-check text-white text-3xl"></i>
            </div>
            
            <!-- Heading -->
            <h3 class="text-gray-900 font-black text-xl mb-2 tracking-wide">Payment Submitted</h3>
            
            <!-- Subtext -->
            <p class="text-gray-500 text-sm font-medium leading-relaxed mb-6">UTR submitted successfully. Thank you!</p>
            
            <!-- OK Button -->
            <button onclick="closeModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-2 rounded-xl text-sm transition-colors min-w-[80px]">
                OK
            </button>
            
        </div>
    </div>

    <script>
        // UPI ID Copy function
        function copyVPA() {
            const vpaInput = document.getElementById('vpa-id');
            navigator.clipboard.writeText(vpaInput.value).then(() => {
                alert('UPI ID successfully copied: ' + vpaInput.value);
            }).catch(err => {
                console.error('Error: ', err);
            });
        }

        // UTR Submit function (Triggers custom popup)
        function submitUTR() {
            const modal = document.getElementById('customModal');
            modal.classList.remove('hidden');

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Submitted";
            btn.disabled = true;
            btn.classList.add('bg-gray-400', 'cursor-not-allowed');
            btn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'shadow-md');
        }

        // Popup close function
        function closeModal() {
            const modal = document.getElementById('customModal');
            modal.classList.add('hidden');
        }

        // Countdown Timer
        let time = 150; 
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            if (time <= 0) {
                clearInterval(countdown);
                return;
            }
            time--;
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
</body>
</html>
